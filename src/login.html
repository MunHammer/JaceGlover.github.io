<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" href="/images/AceBlocksLogo.png" type="image/x-png" />
    <meta charset="UTF-8" />
    <title>AceBlocks | Log In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #04060f;
        --surface: #0d1120;
        --surface2: #131929;
        --border: rgba(99, 120, 255, 0.15);
        --accent: #5b6bff;
        --accent2: #38f0c0;
        --text: #e8eaf6;
        --muted: #7b83a6;
        --glow: rgba(91, 107, 255, 0.35);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Space Grotesk", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999;
        opacity: 0.4;
      }
      header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 18px 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(4, 6, 15, 0.7);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        animation: slideDown 0.6s ease both;
      }
      .logo {
        font-family: "Syne", sans-serif;
        font-size: 1.3rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-decoration: none;
      }
      nav {
        display: flex;
        gap: 32px;
        align-items: center;
      }
      nav a {
        color: var(--muted);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        letter-spacing: 0.02em;
        transition: color 0.2s;
        position: relative;
      }
      nav a::after {
        content: "";
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--accent2);
        transition: width 0.3s ease;
      }
      nav a:hover {
        color: var(--text);
      }
      nav a:hover::after {
        width: 100%;
      }
      .nav-cta {
        padding: 8px 20px;
        background: var(--accent);
        color: #fff !important;
        border-radius: 8px;
        font-weight: 700 !important;
        transition:
          background 0.2s,
          transform 0.2s,
          box-shadow 0.2s !important;
      }
      .nav-cta::after {
        display: none !important;
      }
      .nav-cta:hover {
        background: #7080ff !important;
        transform: translateY(-1px);
        box-shadow: 0 8px 24px var(--glow) !important;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 120px 24px 60px;
        position: relative;
        overflow: hidden;
      }
      main::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse 60% 50% at 20% 50%,
            rgba(91, 107, 255, 0.12) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 50% 40% at 80% 30%,
            rgba(56, 240, 192, 0.08) 0%,
            transparent 70%
          );
        pointer-events: none;
      }
      .grid-lines {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(99, 120, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(99, 120, 255, 0.05) 1px, transparent 1px);
        background-size: 64px 64px;
        mask-image: radial-gradient(
          ellipse 80% 80% at 50% 50%,
          black 30%,
          transparent 100%
        );
        pointer-events: none;
      }

      .auth-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 48px;
        width: 100%;
        max-width: 440px;
        position: relative;
        z-index: 1;
        animation: fadeUp 0.7s 0.2s ease both;
      }
      .auth-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 20px 20px 0 0;
      }

      .auth-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 14px;
        background: rgba(91, 107, 255, 0.12);
        border: 1px solid rgba(91, 107, 255, 0.3);
        border-radius: 100px;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--accent2);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 20px;
      }
      .auth-badge .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent2);
        animation: blink 1.5s ease-in-out infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }

      .auth-card h1 {
        font-family: "Syne", sans-serif;
        font-size: 1.9rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 6px;
      }
      .auth-card .subtitle {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 32px;
        line-height: 1.6;
      }

      .tabs {
        display: flex;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 4px;
        margin-bottom: 28px;
      }
      .tab-btn {
        flex: 1;
        background: none;
        border: none;
        color: var(--muted);
        padding: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        font-family: "Space Grotesk", sans-serif;
        cursor: pointer;
        border-radius: 7px;
        transition: all 0.2s;
      }
      .tab-btn.active {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 4px 16px var(--glow);
      }

      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 6px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .form-group input {
        width: 100%;
        padding: 12px 16px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-size: 0.95rem;
        font-family: "Space Grotesk", sans-serif;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .form-group input:focus {
        border-color: rgba(91, 107, 255, 0.5);
        box-shadow: 0 0 0 3px rgba(91, 107, 255, 0.1);
      }
      .form-group input::placeholder {
        color: var(--muted);
        opacity: 0.5;
      }

      .btn-primary {
        width: 100%;
        padding: 13px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 700;
        font-family: "Space Grotesk", sans-serif;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.2s,
          box-shadow 0.2s;
        margin-top: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-primary:hover {
        background: #6e7dff;
        transform: translateY(-1px);
        box-shadow: 0 8px 24px var(--glow);
      }
      .btn-primary:active {
        transform: scale(0.98);
      }
      .btn-primary:disabled {
        background: #2a2f4a;
        color: var(--muted);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 20px 0;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 600;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .btn-google {
        width: 100%;
        padding: 12px;
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 0.9rem;
        font-weight: 600;
        font-family: "Space Grotesk", sans-serif;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition:
          border-color 0.2s,
          background 0.2s,
          transform 0.2s;
      }
      .btn-google:hover {
        border-color: rgba(91, 107, 255, 0.4);
        background: #1a2236;
        transform: translateY(-1px);
      }

      /* Role toggle */
      .role-toggle {
        display: flex;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 4px;
        margin-bottom: 16px;
      }
      .role-btn {
        flex: 1;
        background: none;
        border: none;
        color: var(--muted);
        padding: 9px 8px;
        font-size: 0.88rem;
        font-weight: 600;
        font-family: "Space Grotesk", sans-serif;
        cursor: pointer;
        border-radius: 7px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .role-btn.active {
        background: var(--surface);
        color: var(--text);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border);
      }
      .role-btn.active.teacher {
        color: #fac850;
        border-color: rgba(250, 200, 80, 0.3);
        background: rgba(250, 200, 80, 0.06);
      }

      .forgot-link {
        display: block;
        text-align: right;
        font-size: 0.8rem;
        color: var(--muted);
        text-decoration: none;
        margin-top: -8px;
        margin-bottom: 16px;
        transition: color 0.2s;
      }
      .forgot-link:hover {
        color: var(--accent2);
      }

      .message {
        margin-top: 16px;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 0.88rem;
        font-weight: 600;
        display: none;
      }
      .message.error {
        background: rgba(255, 80, 80, 0.08);
        border: 1px solid rgba(255, 80, 80, 0.25);
        color: #ff8080;
        display: block;
      }
      .message.success {
        background: rgba(56, 240, 192, 0.08);
        border: 1px solid rgba(56, 240, 192, 0.25);
        color: var(--accent2);
        display: block;
      }

      footer {
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 24px 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      }
      .footer-logo {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      footer p {
        color: var(--muted);
        font-size: 0.85rem;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 700px) {
        header {
          padding: 16px 20px;
        }
        nav {
          gap: 16px;
        }
        .auth-card {
          padding: 32px 20px;
        }
        footer {
          flex-direction: column;
          text-align: center;
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html" class="logo">AceBlocks</a>
      <nav>
        <a href="lessons.html">Lessons</a>
        <a href="learn-more.html">About</a>
        <a href="helpbot.html">Help</a>
        <a href="lessons.html" class="nav-cta">Start Learning</a>
      </nav>
    </header>

    <main>
      <div class="grid-lines"></div>
      <div class="auth-card">
        <div class="auth-badge"><span class="dot"></span>Student Portal</div>
        <h1>Welcome back.</h1>
        <p class="subtitle">
          Log in or create your AceBlocks account to track your progress.
        </p>

        <div class="tabs">
          <button class="tab-btn active" id="tab-login">Log In</button>
          <button class="tab-btn" id="tab-signup">Sign Up</button>
        </div>

        <!-- Login form -->
        <div id="form-login">
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="login-email"
              placeholder="you@example.com"
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" />
          </div>
          <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
          <button class="btn-primary" id="btn-login">
            <svg
              width="15"
              height="15"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              viewBox="0 0 24 24"
            >
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            Log In
          </button>
          <div class="divider">or</div>
          <button class="btn-google" id="btn-google-login">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84z"
              />
            </svg>
            Continue with Google
          </button>
        </div>

        <!-- Sign Up form -->
        <div id="form-signup" style="display: none">
          <div class="role-toggle">
            <button class="role-btn active" id="role-student">
              🎒 I'm a Student
            </button>
            <button class="role-btn teacher" id="role-teacher">
              🏫 I'm a Teacher
            </button>
          </div>
          <div class="form-group">
            <label>Display Name</label>
            <input type="text" id="signup-name" placeholder="Your name" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="signup-email"
              placeholder="you@example.com"
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="signup-password"
              placeholder="At least 6 characters"
            />
          </div>
          <button class="btn-primary" id="btn-signup">
            <svg
              width="15"
              height="15"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              viewBox="0 0 24 24"
            >
              <path d="M12 5v14M5 12h14" />
            </svg>
            Create Account
          </button>
          <div class="divider">or</div>
          <button class="btn-google" id="btn-google-signup">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84z"
              />
            </svg>
            Continue with Google
          </button>
        </div>

        <div class="message" id="auth-message"></div>
      </div>
    </main>

    <footer>
      <div class="footer-logo">AceBlocks</div>
      <p>© 2026 AceBlocks — Coding for the Future</p>
      <p>Created by Jace Glover</p>
    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        updateProfile,
        signInWithPopup,
        GoogleAuthProvider,
        onAuthStateChanged,
        sendPasswordResetEmail,
      } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
      } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyA3PF0jklshcBZLm4Tm_-K10RUok15Mu3U",
        authDomain: "aceblocks.firebaseapp.com",
        projectId: "aceblocks",
        storageBucket: "aceblocks.firebasestorage.app",
        messagingSenderId: "295224865929",
        appId: "1:295224865929:web:d82a392b52d2c856c58258",
        measurementId: "G-J0N2L9FGD9",
      };

      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const provider = new GoogleAuthProvider();

      // ── Role helper ───────────────────────────────────────
      async function getRedirectUrl(user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists() && snap.data().role === "teacher")
          return "teacher-dashboard.html";
        // Also check teachers collection (for Google sign-in teachers)
        const tsnap = await getDoc(doc(db, "teachers", user.uid));
        if (tsnap.exists()) return "teacher-dashboard.html";
        return "dashboard.html";
      }

      // Redirect already-logged-in users to the right dashboard
      onAuthStateChanged(auth, async (user) => {
        if (user) window.location.href = await getRedirectUrl(user);
      });

      // ── Helpers ──────────────────────────────────────────
      function showMsg(text, type) {
        const el = document.getElementById("auth-message");
        el.textContent = text;
        el.className = "message " + type;
      }

      function setLoading(btnId, loading, defaultHTML) {
        const btn = document.getElementById(btnId);
        btn.disabled = loading;
        if (loading) {
          btn.textContent = "Please wait...";
        } else {
          btn.innerHTML = defaultHTML;
        }
      }

      function friendlyError(code) {
        const map = {
          "auth/user-not-found": "No account found with that email.",
          "auth/wrong-password": "Incorrect password. Try again.",
          "auth/invalid-credential": "Incorrect email or password.",
          "auth/email-already-in-use":
            "An account with this email already exists.",
          "auth/weak-password": "Password should be at least 6 characters.",
          "auth/invalid-email": "Please enter a valid email address.",
          "auth/too-many-requests":
            "Too many attempts. Please wait a moment and try again.",
          "auth/popup-closed-by-user":
            "Sign-in popup was closed. Please try again.",
          "auth/network-request-failed":
            "Network error. Check your connection and try again.",
        };
        return map[code] || "Something went wrong. Please try again.";
      }

      // ── Tab switching ─────────────────────────────────────
      function switchTab(tab) {
        const isLogin = tab === "login";
        document.getElementById("form-login").style.display = isLogin
          ? "block"
          : "none";
        document.getElementById("form-signup").style.display = isLogin
          ? "none"
          : "block";
        document
          .getElementById("tab-login")
          .classList.toggle("active", isLogin);
        document
          .getElementById("tab-signup")
          .classList.toggle("active", !isLogin);
        document.getElementById("auth-message").className = "message";
      }

      document
        .getElementById("tab-login")
        .addEventListener("click", () => switchTab("login"));
      document
        .getElementById("tab-signup")
        .addEventListener("click", () => switchTab("signup"));

      // ── Log In ────────────────────────────────────────────
      async function handleLogin() {
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        if (!email || !password)
          return showMsg("Please fill in all fields.", "error");

        setLoading("btn-login", true);
        try {
          const { user } = await signInWithEmailAndPassword(
            auth,
            email,
            password,
          );
          showMsg("Logged in! Redirecting...", "success");
          setTimeout(async () => {
            window.location.href = await getRedirectUrl(user);
          }, 700);
        } catch (e) {
          showMsg(friendlyError(e.code), "error");
          setLoading(
            "btn-login",
            false,
            `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg> Log In`,
          );
        }
      }

      // ── Role toggle ───────────────────────────────────────
      let selectedRole = "student";
      document.getElementById("role-student").addEventListener("click", () => {
        selectedRole = "student";
        document.getElementById("role-student").classList.add("active");
        document.getElementById("role-teacher").classList.remove("active");
      });
      document.getElementById("role-teacher").addEventListener("click", () => {
        selectedRole = "teacher";
        document.getElementById("role-teacher").classList.add("active");
        document.getElementById("role-student").classList.remove("active");
      });

      // ── Sign Up ───────────────────────────────────────────
      async function handleSignUp() {
        const name = document.getElementById("signup-name").value.trim();
        const email = document.getElementById("signup-email").value.trim();
        const password = document.getElementById("signup-password").value;
        if (!name || !email || !password)
          return showMsg("Please fill in all fields.", "error");
        if (password.length < 6)
          return showMsg("Password must be at least 6 characters.", "error");

        setLoading("btn-signup", true);
        try {
          const { user } = await createUserWithEmailAndPassword(
            auth,
            email,
            password,
          );
          await updateProfile(user, { displayName: name });

          // Save role + profile to Firestore
          await setDoc(doc(db, "users", user.uid), {
            uid: user.uid,
            name,
            email,
            role: selectedRole,
            photoURL: null,
            lessonsComplete: 0,
            xp: 0,
          });

          // If teacher, also create teachers doc
          if (selectedRole === "teacher") {
            await setDoc(doc(db, "teachers", user.uid), {
              uid: user.uid,
              name,
              email,
            });
          }

          showMsg("Account created! Redirecting...", "success");
          setTimeout(() => {
            window.location.href =
              selectedRole === "teacher"
                ? "teacher-dashboard.html"
                : "dashboard.html";
          }, 700);
        } catch (e) {
          showMsg(friendlyError(e.code), "error");
          setLoading(
            "btn-signup",
            false,
            `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Create Account`,
          );
        }
      }

      // ── Google ────────────────────────────────────────────
      async function handleGoogle() {
        try {
          const { user } = await signInWithPopup(auth, provider);
          // Save to Firestore if first time (merge so existing role isn't overwritten)
          await setDoc(
            doc(db, "users", user.uid),
            {
              uid: user.uid,
              name: user.displayName || user.email.split("@")[0],
              email: user.email,
              photoURL: user.photoURL || null,
            },
            { merge: true },
          );
          showMsg("Signed in! Redirecting...", "success");
          setTimeout(async () => {
            window.location.href = await getRedirectUrl(user);
          }, 700);
        } catch (e) {
          showMsg(friendlyError(e.code), "error");
        }
      }

      // ── Forgot password ───────────────────────────────────
      document
        .getElementById("forgot-link")
        .addEventListener("click", async (e) => {
          e.preventDefault();
          const email = document.getElementById("login-email").value.trim();
          if (!email) return showMsg("Enter your email above first.", "error");
          try {
            await sendPasswordResetEmail(auth, email);
            showMsg("Password reset email sent! Check your inbox.", "success");
          } catch (e) {
            showMsg(friendlyError(e.code), "error");
          }
        });

      // ── Event listeners ───────────────────────────────────
      document
        .getElementById("btn-login")
        .addEventListener("click", handleLogin);
      document
        .getElementById("btn-signup")
        .addEventListener("click", handleSignUp);
      document
        .getElementById("btn-google-login")
        .addEventListener("click", handleGoogle);
      document
        .getElementById("btn-google-signup")
        .addEventListener("click", handleGoogle);

      document.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        document.getElementById("form-login").style.display !== "none"
          ? handleLogin()
          : handleSignUp();
      });
    </script>
  </body>
</html>
