<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" href="/images/AceBlocksLogo.png" type="image/x-png" />
    <meta charset="UTF-8" />
    <title>AceBlocks | Log In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link href="styles/login.css" rel="stylesheet" />
    <script type="module" src="scripts/login.mjs"></script>
  </head>
  <body>
    <header>
      <a href="index.html" class="logo">AceBlocks</a>
      <nav>
        <a href="lessons.html">Lessons</a>
        <a href="learn-more.html">About</a>
        <a href="helpbot.html">Help</a>
        <a href="lessons.html" class="nav-cta">Start Learning</a>
      </nav>
    </header>

    <main>
      <div class="grid-lines"></div>
      <div class="auth-card">
        <div class="auth-badge"><span class="dot"></span>Student Portal</div>
        <h1>Welcome back.</h1>
        <p class="subtitle">
          Log in or create your AceBlocks account to track your progress.
        </p>

        <div class="tabs">
          <button class="tab-btn active" id="tab-login">Log In</button>
          <button class="tab-btn" id="tab-signup">Sign Up</button>
        </div>

        <!-- Login form -->
        <div id="form-login">
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="login-email"
              placeholder="you@example.com"
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" />
          </div>
          <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
          <button class="btn-primary" id="btn-login">
            <svg
              width="15"
              height="15"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              viewBox="0 0 24 24"
            >
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            Log In
          </button>
          <div class="divider">or</div>
          <button class="btn-google" id="btn-google-login">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84z"
              />
            </svg>
            Continue with Google
          </button>
        </div>

        <!-- Sign Up form -->
        <div id="form-signup" style="display: none">
          <div class="role-toggle">
            <button class="role-btn active" id="role-student">
              🎒 I'm a Student
            </button>
            <button class="role-btn teacher" id="role-teacher">
              🏫 I'm a Teacher
            </button>
          </div>
          <div class="form-group">
            <label>Display Name</label>
            <input type="text" id="signup-name" placeholder="Your name" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="signup-email"
              placeholder="you@example.com"
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="signup-password"
              placeholder="At least 6 characters"
            />
          </div>
          <button class="btn-primary" id="btn-signup">
            <svg
              width="15"
              height="15"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              viewBox="0 0 24 24"
            >
              <path d="M12 5v14M5 12h14" />
            </svg>
            Create Account
          </button>
          <div class="divider">or</div>
          <button class="btn-google" id="btn-google-signup">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84z"
              />
            </svg>
            Continue with Google
          </button>
        </div>

        <div class="message" id="auth-message"></div>
      </div>
    </main>

    <footer>
      <div class="footer-logo">AceBlocks</div>
      <p>© 2026 AceBlocks — Coding for the Future</p>
      <p>Created by Jace Glover</p>
    </footer>
  </body>
</html>
