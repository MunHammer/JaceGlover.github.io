<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="AceBlocksLogo.png" type="image/x-png">
  <meta charset="UTF-8">
  <title>AceBlocks | Sandbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04060f;
      --surface: #0d1120;
      --surface2: #131929;
      --surface3: #0a0d18;
      --border: rgba(99,120,255,0.15);
      --accent: #5b6bff;
      --accent2: #38f0c0;
      --text: #e8eaf6;
      --muted: #7b83a6;
      --glow: rgba(91,107,255,0.35);
      --error: #ff6b6b;
      --warn: #ffd93d;
      --success: #38f0c0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: rgba(4,6,15,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mode-tabs {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }

    .mode-tab {
      padding: 5px 16px;
      border: none;
      background: none;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .mode-tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px var(--glow);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-run {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .btn-run:hover { background: #6e7dff; box-shadow: 0 6px 20px var(--glow); transform: translateY(-1px); }
    .btn-run:active { transform: scale(0.97); }

    .btn-clear {
      padding: 8px 14px;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear:hover { color: var(--text); border-color: rgba(91,107,255,0.35); }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--text); }

    /* MAIN LAYOUT */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 57px);
    }

    /* EDITOR PANEL */
    .editor-panel {
      display: flex;
      flex-direction: column;
      width: 50%;
      border-right: 1px solid var(--border);
      min-width: 280px;
    }

    /* HTML+CSS+JS tabs */
    .file-tabs {
      display: flex;
      background: var(--surface3);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .file-tab {
      padding: 8px 18px;
      border: none;
      background: none;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .file-tab.active {
      color: var(--accent2);
      border-bottom-color: var(--accent2);
      background: var(--surface);
    }

    .file-tab:hover:not(.active) { color: var(--text); }

    /* CODE EDITOR */
    .editor-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
    }

    .line-numbers {
      padding: 16px 0;
      background: var(--surface3);
      border-right: 1px solid var(--border);
      text-align: right;
      color: var(--muted);
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      user-select: none;
      min-width: 44px;
      padding: 16px 10px;
      overflow: hidden;
      flex-shrink: 0;
    }

    textarea.code-input {
      flex: 1;
      padding: 16px;
      background: var(--surface);
      color: var(--text);
      border: none;
      outline: none;
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      tab-size: 2;
      white-space: pre;
      overflow-wrap: normal;
      overflow-x: auto;
      spellcheck: false;
    }

    textarea.code-input::selection { background: rgba(91,107,255,0.3); }

    /* RIGHT PANEL */
    .right-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    /* PREVIEW */
    .preview-wrap {
      flex: 1;
      position: relative;
      background: #fff;
      overflow: hidden;
    }

    .preview-label {
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      z-index: 2;
      pointer-events: none;
    }

    iframe#preview {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    /* CONSOLE */
    .console-wrap {
      height: 200px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .console-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      background: var(--surface3);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .console-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .console-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
    }

    .btn-clear-console {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      transition: color 0.2s;
    }
    .btn-clear-console:hover { color: var(--text); }

    .console-output {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 12.5px;
      line-height: 1.7;
      background: var(--surface3);
    }

    .console-output::-webkit-scrollbar { width: 4px; }
    .console-output::-webkit-scrollbar-track { background: transparent; }
    .console-output::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

    .log-line { display: flex; gap: 10px; align-items: flex-start; padding: 1px 0; }
    .log-line .log-type { flex-shrink: 0; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; margin-top: 3px; }
    .log-line .log-msg { flex: 1; word-break: break-all; white-space: pre-wrap; }

    .log-line.log { color: var(--text); }
    .log-line.log .log-type { color: var(--muted); }
    .log-line.error { color: var(--error); }
    .log-line.error .log-type { color: var(--error); }
    .log-line.warn { color: var(--warn); }
    .log-line.warn .log-type { color: var(--warn); }
    .log-line.info { color: #7eb3ff; }
    .log-line.info .log-type { color: #7eb3ff; }
    .log-line.system { color: var(--muted); font-style: italic; }

    .console-empty {
      color: var(--muted);
      font-style: italic;
      font-size: 12px;
      padding: 4px 0;
    }

    /* RESIZE HANDLE */
    .resize-handle {
      width: 4px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.2s;
      position: relative;
    }
    .resize-handle:hover, .resize-handle.dragging { background: var(--accent); }

    @media (max-width: 700px) {
      .workspace { flex-direction: column; height: auto; overflow: auto; }
      .editor-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); height: 40vh; }
      .right-panel { height: 60vh; }
      .resize-handle { display: none; }
      .header-center { display: none; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">AceBlocks</a>

  <div class="header-center">
    <div class="mode-tabs">
      <button class="mode-tab active" id="mode-js">JavaScript</button>
      <button class="mode-tab" id="mode-html">HTML + CSS + JS</button>
    </div>
  </div>

  <div class="header-right">
    <nav><a href="lessons.html">Lessons</a></nav>
    <button class="btn-clear" id="btn-reset">Reset</button>
    <button class="btn-run" id="btn-run">
      <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Run
    </button>
  </div>
</header>

<div class="workspace">

  <!-- EDITOR -->
  <div class="editor-panel" id="editor-panel">

    <!-- File tabs (HTML mode only) -->
    <div class="file-tabs" id="file-tabs" style="display:none;">
      <button class="file-tab active" data-file="html">HTML</button>
      <button class="file-tab" data-file="css">CSS</button>
      <button class="file-tab" data-file="js">JS</button>
    </div>

    <div class="editor-wrap">
      <div class="line-numbers" id="line-numbers">1</div>
      <textarea class="code-input" id="code-input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
  </div>

  <!-- RESIZE HANDLE -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- RIGHT: PREVIEW + CONSOLE -->
  <div class="right-panel">
    <div class="preview-wrap">
      <div class="preview-label">Preview</div>
      <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>

    <div class="console-wrap">
      <div class="console-header">
        <div class="console-title">
          <span class="console-dot"></span>
          Console
        </div>
        <button class="btn-clear-console" id="btn-clear-console">Clear</button>
      </div>
      <div class="console-output" id="console-output">
        <div class="console-empty">Run your code to see output here.</div>
      </div>
    </div>
  </div>

</div>

<script>
  // ── DEFAULT CODE ──────────────────────────────────────────────
  const DEFAULTS = {
    js: `// Welcome to the AceBlocks JS Sandbox!
// Write JavaScript below and hit Run.

const greeting = "Hello, AceBlocks!"
console.log(greeting)

// Try some maths
const nums = [1, 2, 3, 4, 5]
const total = nums.reduce((a, b) => a + b, 0)
console.log("Sum:", total)

// Or manipulate the preview
document.body.style.background = "#04060f"
document.body.innerHTML = \`
  <div style="font-family:sans-serif;color:#e8eaf6;display:flex;align-items:center;
    justify-content:center;height:100vh;flex-direction:column;gap:12px;">
    <h1 style="font-size:2rem;">👋 Hello from JS!</h1>
    <p style="color:#7b83a6;">Edit the code and hit Run</p>
  </div>
\``,

    html: `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Page</title>
</head>
<body>
  <h1>Hello, AceBlocks!</h1>
  <p>Edit this HTML and hit Run.</p>
</body>
</html>`,

    css: `/* Styles for your HTML */
body {
  font-family: 'Segoe UI', sans-serif;
  background: #04060f;
  color: #e8eaf6;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
  padding: 2rem;
}

h1 {
  font-size: 2.5rem;
  background: linear-gradient(135deg, #5b6bff, #38f0c0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 1rem;
}

p {
  color: #7b83a6;
  font-size: 1.1rem;
}`,

    htmljs: `// JavaScript for your HTML page
console.log("Page loaded!")

document.querySelector('h1').addEventListener('click', () => {
  console.log("Heading clicked!")
})`
  }

  // ── STATE ─────────────────────────────────────────────────────
  let mode = 'js' // 'js' or 'html'
  let activeFile = 'html' // for html mode: 'html', 'css', 'js'
  let files = {
    html: DEFAULTS.html,
    css: DEFAULTS.css,
    js: DEFAULTS.htmljs
  }

  const codeInput = document.getElementById('code-input')
  const lineNumbers = document.getElementById('line-numbers')
  const preview = document.getElementById('preview')
  const consoleOutput = document.getElementById('console-output')
  const fileTabs = document.getElementById('file-tabs')

  // ── LINE NUMBERS ──────────────────────────────────────────────
  function updateLineNumbers() {
    const lines = codeInput.value.split('\n').length
    lineNumbers.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>')
  }

  codeInput.addEventListener('input', updateLineNumbers)
  codeInput.addEventListener('scroll', () => {
    lineNumbers.scrollTop = codeInput.scrollTop
  })

  // Tab key inserts spaces
  codeInput.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault()
      const start = codeInput.selectionStart
      const end = codeInput.selectionEnd
      codeInput.value = codeInput.value.substring(0, start) + '  ' + codeInput.value.substring(end)
      codeInput.selectionStart = codeInput.selectionEnd = start + 2
      updateLineNumbers()
    }
  })

  // ── MODE SWITCHING ────────────────────────────────────────────
  document.getElementById('mode-js').addEventListener('click', () => setMode('js'))
  document.getElementById('mode-html').addEventListener('click', () => setMode('html'))

  function setMode(newMode) {
    // Save current editor content
    if (mode === 'js') {
      DEFAULTS.js = codeInput.value
    } else {
      files[activeFile] = codeInput.value
    }

    mode = newMode
    document.getElementById('mode-js').classList.toggle('active', mode === 'js')
    document.getElementById('mode-html').classList.toggle('active', mode === 'html')
    fileTabs.style.display = mode === 'html' ? 'flex' : 'none'

    if (mode === 'js') {
      codeInput.value = DEFAULTS.js
    } else {
      activeFile = 'html'
      setActiveFileTab('html')
      codeInput.value = files.html
    }

    updateLineNumbers()
    clearConsole()
  }

  // ── FILE TABS (HTML mode) ─────────────────────────────────────
  document.querySelectorAll('.file-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      files[activeFile] = codeInput.value
      activeFile = tab.dataset.file
      setActiveFileTab(activeFile)
      codeInput.value = files[activeFile]
      updateLineNumbers()
    })
  })

  function setActiveFileTab(file) {
    document.querySelectorAll('.file-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.file === file)
    })
  }

  // ── CONSOLE ───────────────────────────────────────────────────
  function clearConsole() {
    consoleOutput.innerHTML = '<div class="console-empty">Run your code to see output here.</div>'
  }

  function addLog(msg, type = 'log') {
    const empty = consoleOutput.querySelector('.console-empty')
    if (empty) empty.remove()

    const labels = { log: 'LOG', error: 'ERR', warn: 'WARN', info: 'INF', system: '···' }
    const line = document.createElement('div')
    line.className = `log-line ${type}`
    line.innerHTML = `<span class="log-type">${labels[type] || 'LOG'}</span><span class="log-msg">${escapeHtml(String(msg))}</span>`
    consoleOutput.appendChild(line)
    consoleOutput.scrollTop = consoleOutput.scrollHeight
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  document.getElementById('btn-clear-console').addEventListener('click', clearConsole)

  // Listen for messages from the iframe
  window.addEventListener('message', e => {
    if (!e.data || !e.data.type) return
    const { type, args } = e.data
    if (['log','error','warn','info'].includes(type)) {
      addLog(args.join(' '), type)
    }
  })

  // ── RUN ───────────────────────────────────────────────────────
  document.getElementById('btn-run').addEventListener('click', runCode)

  function runCode() {
    // Save current tab content
    if (mode === 'html') files[activeFile] = codeInput.value

    clearConsole()
    addLog('Running...', 'system')

    // Intercept console in iframe via postMessage
    const interceptor = `
      <script>
        (function() {
          const send = (type, args) => window.parent.postMessage({ type, args: args.map(a => {
            try { return typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a) } catch(e) { return String(a) }
          })}, '*')
          ;['log','warn','info'].forEach(m => {
            const orig = console[m]
            console[m] = (...args) => { send(m, args); orig.apply(console, args) }
          })
          window.onerror = (msg, src, line, col) => {
            send('error', [msg + ' (line ' + line + ')'])
            return true
          }
          window.addEventListener('unhandledrejection', e => {
            send('error', ['Unhandled promise rejection: ' + e.reason])
          })
        })()
      <\/script>
    `

    let html = ''

    if (mode === 'js') {
      const code = codeInput.value
      html = `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>
        ${interceptor}
        <script>
          try { ${code} } catch(e) { window.parent.postMessage({type:'error',args:[e.message]}, '*') }
        <\/script>
      </body></html>`
    } else {
      // Inject CSS and JS into HTML
      const htmlCode = files.html
      const cssCode = files.css
      const jsCode = files.js

      // Try to inject into <head> and before </body>
      let doc = htmlCode
      const styleTag = `<style>${cssCode}</style>`
      const scriptTag = `${interceptor}<script>try{${jsCode}}catch(e){window.parent.postMessage({type:'error',args:[e.message]},'*')}<\/script>`

      if (doc.includes('</head>')) {
        doc = doc.replace('</head>', styleTag + '</head>')
      } else {
        doc = styleTag + doc
      }

      if (doc.includes('</body>')) {
        doc = doc.replace('</body>', scriptTag + '</body>')
      } else {
        doc = doc + scriptTag
      }

      html = doc
    }

    const blob = new Blob([html], { type: 'text/html' })
    const url = URL.createObjectURL(blob)
    preview.src = url
    setTimeout(() => URL.revokeObjectURL(url), 5000)
  }

  // ── RESET ─────────────────────────────────────────────────────
  document.getElementById('btn-reset').addEventListener('click', () => {
    if (!confirm('Reset code to default?')) return
    if (mode === 'js') {
      codeInput.value = `// Welcome to the AceBlocks JS Sandbox!\n// Write JavaScript below and hit Run.\n\nconsole.log("Hello, AceBlocks!")`
    } else {
      files = { html: DEFAULTS.html, css: DEFAULTS.css, js: DEFAULTS.htmljs }
      codeInput.value = files[activeFile]
    }
    updateLineNumbers()
    clearConsole()
    preview.src = 'about:blank'
  })

  // ── RESIZE HANDLE ─────────────────────────────────────────────
  const handle = document.getElementById('resize-handle')
  const editorPanel = document.getElementById('editor-panel')
  let isResizing = false

  handle.addEventListener('mousedown', e => {
    isResizing = true
    handle.classList.add('dragging')
    document.body.style.cursor = 'col-resize'
    document.body.style.userSelect = 'none'
  })

  document.addEventListener('mousemove', e => {
    if (!isResizing) return
    const workspace = document.querySelector('.workspace')
    const rect = workspace.getBoundingClientRect()
    const newWidth = Math.min(Math.max(e.clientX - rect.left, 200), rect.width - 200)
    editorPanel.style.width = newWidth + 'px'
    editorPanel.style.flex = 'none'
  })

  document.addEventListener('mouseup', () => {
    if (!isResizing) return
    isResizing = false
    handle.classList.remove('dragging')
    document.body.style.cursor = ''
    document.body.style.userSelect = ''
  })

  // ── INIT ──────────────────────────────────────────────────────
  codeInput.value = DEFAULTS.js
  updateLineNumbers()
</script>

</body>
</html>
