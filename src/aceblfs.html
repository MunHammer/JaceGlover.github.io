<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AceBlocks Lessons</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b0f19;
  color:white;
}

/* LAYOUT */
.container{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#111827;
  padding:20px;
  overflow-y:auto;
}

.lesson{
  padding:12px;
  background:#1f2937;
  margin-bottom:10px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.lesson:hover{
  background:#3b82f6;
}

/* MAIN */
.main{
  flex:1;
  padding:40px;
}

.card{
  background:#1f2937;
  padding:25px;
  border-radius:12px;
  max-width:700px;
}

textarea{
  width:100%;
  height:180px;
  margin-top:15px;
  background:#0b0f19;
  color:#22c55e;
  border:none;
  padding:10px;
  border-radius:8px;
  font-family:monospace;
}

/* BUTTONS */
button{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

.status{
  margin-top:10px;
  color:#9ca3af;
}
</style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Lessons</h2>

    <div class="lesson" onclick="loadLesson(1)">Lesson 1: Hello World</div>
    <div class="lesson" onclick="loadLesson(2)">Lesson 2: Variables</div>
    <div class="lesson" onclick="loadLesson(3)">Lesson 3: If Statements</div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="card">
      <h2 id="title">Welcome</h2>
      <p id="desc">Select a lesson to begin.</p>

      <textarea id="code">// your code here</textarea>

      <button onclick="check()">Check Answer</button>

      <div class="status" id="status"></div>
    </div>
  </div>

</div>

<script>

let currentLesson = 0;

const lessons = {
  1: {
    title: "Hello World",
    desc: "Write a program that prints Hello World.",
    answer: "print('Hello World')"
  },
  2: {
    title: "Variables",
    desc: "Create a variable called x and set it to 5.",
    answer: "x = 5"
  },
  3: {
    title: "If Statements",
    desc: "Write an if statement checking if x is greater than 3.",
    answer: "if x > 3"
  }
};

function loadLesson(id){
  currentLesson = id;
  document.getElementById("title").innerText = lessons[id].title;
  document.getElementById("desc").innerText = lessons[id].desc;
  document.getElementById("code").value = "";
  document.getElementById("status").innerText = "";
}

function check(){
  let input = document.getElementById("code").value.trim();
  let correct = lessons[currentLesson].answer;

  if(input.includes(correct)){
    document.getElementById("status").innerText = "✅ Correct! Lesson completed.";
    document.getElementById("status").style.color = "#22c55e";
  } else {
    document.getElementById("status").innerText = "❌ Not quite right, try again.";
    document.getElementById("status").style.color = "#ef4444";
  }
}

</script>

</body>
</html>
